name: Code Pushed

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  call-code-pushed:
    name: Call Code Pushed
    uses: ./.github/workflows/PullRequestChanged.yaml
  release:
    name: Release
    needs: call-code-pushed
    runs-on: ubuntu-latest
    steps:
      - name: Create Releaser App Token
        id: app-token
        uses: actions/create-github-app-token@5d869da34e18e7287c1daad50e0b8ea0f506ce69
        with:
          app-id: ${{ vars.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_SECRET }}
      - name: Checkout Repository
        uses: actions/checkout@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24.13.0
      - name: Install Dependencies
        run: npm install
      - name: Run Semantic Release
        run: npx -p semantic-release -p @semantic-release/changelog -p @semantic-release/commit-analyzer -p @semantic-release/exec -p @semantic-release/git -p @semantic-release/github -p @semantic-release/release-notes-generator -p @droidsolutions-oss/semantic-release-update-file -p conventional-changelog-conventionalcommits semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
